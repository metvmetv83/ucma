name: MeTube M3U Update

on:
  schedule:
    - cron: '0 */3 * * *' # Her 3 saatte bir otomatik çalışır
  workflow_dispatch:      # Manuel çalıştırma butonu

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Repoyu Çek
        uses: actions/checkout@v4

      - name: 🐍 Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Bağımlılıkları Yükle
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp

      - name: 🎥 M3U Oluştur
        run: python generate_m3u.py

      - name: 📤 Değişiklikleri Kaydet (Push)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add metube.m3u
          if git diff --staged --quiet; then
            echo "Güncelleme yok."
          else
            git commit -m "🔄 M3U Otomatik Güncellendi: $(date +'%d-%m-%Y %H:%M')"
            git push
          fi
